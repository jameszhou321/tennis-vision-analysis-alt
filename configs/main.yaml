# Main Configuration — Current optimal, used directly for formal training
# Blueprint: mst_v2_global_only_merged (three visual streams merged + pose + Focal Loss)
# Usage: python src/model/mst/train.py --config configs/main.yaml

# ── Data ──────────────────────────────────────────────────────────────────────
data_root: "data/rallies_train"
crops_root: "data/rallies_train"
seq_len: 120
min_seq_len: 60
reshuffle_augment: true
train_ratio: 0.8
num_classes: 5
class_weights: [1.0, 4.0, 5.0, 4.0, 1.5]

# ── Model Architecture ──────────────────────────────────────────────────────────
use_visual: true
use_player_crops: true
use_pose: true
use_pos_encoding: false          # Disable position encoding to prevent the model from relying on absolute position
visual_backbone: "yolo11"
global_backbone_weights: "models/yolo/yolo11n.pt"
backbone_weights: "models/yolo/yolo11n-pose.pt"
unfreeze_backbone: true
multi_scale_levels: [3, 4, 5]
tokens_per_scale: 4
visual_tokens: 16
merge_visual_tokens: true        # Three streams are concatenated and passed through shared_resampler → 16 tokens/frame
parallel_backbones: false

# ── Model Hyperparameters ──────────────────────────────────────────────────────
embed_dim: 128
depth: 8
num_heads: 4
dropout: 0.3

# ── Training ───────────────────────────────────────────────────────────────────
batch_size: 2
virtual_batch_size: 64
total_epochs: 100
learning_rate: 1.0e-4
weight_decay: 0.05
warmup_epochs: 5
loss: "focal"
focal_gamma: 2.0
keyframe_loss_weight: 0.5

# ── Hardware ───────────────────────────────────────────────────────────────────
num_workers: 2
pin_memory: true
transformer_checkpoint: true