# court_14pts_weighted.yaml
path: ./Court_Finetune_Workspace/dataset_v2 # Points to your newly generated v2 dataset
train: train/images
val: val/images

names:
  0: tennis_court

kpt_shape: [14, 3]

# 🌟 Core Magic: Custom Keypoint Weights (Sigmas)
# The array order corresponds to your points 1-14
# The first 4 corner points are given an extremely small sigma (0.015), giving them absolute dominance in the Loss calculation
# The remaining 10 auxiliary points are given a larger sigma (0.085), allowing for some error and serving only as support
sigmas: [
  0.015, 0.015, 0.015, 0.015,   # 1-4: The four base corners (High weight)
  0.085, 0.085,                 # 5-6: Baseline midpoints (Low weight)
  0.085, 0.085, 0.085,          # 7-9: Far service line (Low weight)
  0.085, 0.085, 0.085,          # 10-12: Near service line (Low weight)
  0.085, 0.085                  # 13-14: Net posts (Low weight)
]