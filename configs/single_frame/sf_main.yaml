# Single-frame version — based on main.yaml, changes seq_len to 1 to ablate the impact of temporal information
# Comparing this with main.yaml reveals the importance of temporal context for action recognition
# Usage: python src/model/mst/train.py --config configs/single_frame/sf_main.yaml

# ── Data ──────────────────────────────────────────────────────────────────────
data_root: "data/rallies_train"
crops_root: "data/rallies_train"
seq_len: 1                    # Single frame, no temporal context
min_seq_len: 1
reshuffle_augment: false      # No reshuffle needed for single frame, each frame is independent
train_ratio: 0.8
num_classes: 5
class_weights: [1.0, 4.0, 5.0, 4.0, 1.5]

# ── Model Architecture ──────────────────────────────────────────────────────────
use_visual: true
use_player_crops: true
use_pose: true
use_pos_encoding: false
visual_backbone: "yolo11"
global_backbone_weights: "models/yolo/yolo11n.pt"
backbone_weights: "models/yolo/yolo11n-pose.pt"
unfreeze_backbone: true
multi_scale_levels: [3, 4, 5]
tokens_per_scale: 4
visual_tokens: 16
merge_visual_tokens: true
parallel_backbones: false

# ── Model Hyperparameters ──────────────────────────────────────────────────────
embed_dim: 128
depth: 8
num_heads: 4
dropout: 0.3

# ── Training ───────────────────────────────────────────────────────────────────
# When seq_len=1 each frame is independent, so batch_size can be increased
# Original main.yaml had batch_size=2, virtual_batch_size=64 (seq_len=120)
# Now the computation per frame is roughly 1/8 of the main config (transformer part is saved, backbone remains the same)
batch_size: 32
virtual_batch_size: 64
total_epochs: 60
learning_rate: 1.0e-4
weight_decay: 0.05
warmup_epochs: 5
loss: "focal"
focal_gamma: 2.0
keyframe_loss_weight: 0.0     # No concept of keyframes in single frame, disable keyframe loss

# ── Hardware ───────────────────────────────────────────────────────────────────
num_workers: 2
pin_memory: true
transformer_checkpoint: true